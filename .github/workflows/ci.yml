# CI für ScatterTo: baut und testet bei jedem Push/PR auf main.
# (Release-Builds macht release.yml bei v*-Tags.)

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v6

      - name: Unit-Tests + Debug-Build
        run: ./gradlew testDebugUnitTest assembleDebug
